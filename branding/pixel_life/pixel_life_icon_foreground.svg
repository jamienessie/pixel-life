<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Pixel Life adaptive icon foreground">
  <!-- Adaptive icon FOREGROUND layer (Android 8+).
       Transparent background. PL monogram + coral accent only.
       Subject sized to inner 66% so launcher masks (circle, squircle,
       rounded square) do not crop the mark. Same construction as
       pixel_life_icon.svg but with the slab border removed and the
       monogram inset to leave Android's mask safe area. -->

  <!-- Pixel grid: each rect 56x56, origin (32, 32). -->

  <!-- "P" at cols 0..2, rows 1..5 -->
  <rect x="32"  y="88"  width="56" height="56" fill="#111111"/>
  <rect x="88"  y="88"  width="56" height="56" fill="#111111"/>
  <rect x="144" y="88"  width="56" height="56" fill="#111111"/>
  <rect x="32"  y="144" width="56" height="56" fill="#111111"/>
  <rect x="144" y="144" width="56" height="56" fill="#111111"/>
  <rect x="32"  y="200" width="56" height="56" fill="#111111"/>
  <rect x="88"  y="200" width="56" height="56" fill="#111111"/>
  <rect x="144" y="200" width="56" height="56" fill="#111111"/>
  <rect x="32"  y="256" width="56" height="56" fill="#111111"/>
  <rect x="32"  y="312" width="56" height="56" fill="#111111"/>

  <!-- "L" at cols 4..6, rows 1..5 -->
  <rect x="256" y="88"  width="56" height="56" fill="#111111"/>
  <rect x="256" y="144" width="56" height="56" fill="#111111"/>
  <rect x="256" y="200" width="56" height="56" fill="#111111"/>
  <rect x="256" y="256" width="56" height="56" fill="#111111"/>
  <rect x="256" y="312" width="56" height="56" fill="#111111"/>
  <rect x="312" y="312" width="56" height="56" fill="#111111"/>
  <rect x="368" y="312" width="56" height="56" fill="#111111"/>

  <!-- Coral accent pixel at col 7, row 6 -->
  <rect x="424" y="368" width="56" height="56" fill="#ff5d7a"/>
</svg>

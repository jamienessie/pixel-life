<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Pixel Life adaptive icon background">
  <!-- Adaptive icon BACKGROUND layer (Android 8+).
       Solid cream paper #fff8e6, full-bleed 512x512.
       No content — the foreground layer carries all marks. -->
  <rect width="512" height="512" fill="#fff8e6"/>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Pixel Life">
  <!-- Pixel Life master app icon, 512x512.
       Brand: Sunny (cream paper + ink black + coral accent).
       Construction: 8-column x 8-row pixel grid, each "pixel" = 56x56,
       with 32px outer margin. PL monogram side-by-side, single coral
       accent pixel bottom-right. Square master, NO baked corner radius
       — Play Store and Android adaptive masks handle rounding. -->

  <!-- Paper field -->
  <rect width="512" height="512" fill="#fff8e6"/>

  <!-- Ink slab border, 8px (matches Sunny's 3px UI border scaled up for icon) -->
  <rect x="4" y="4" width="504" height="504" fill="none" stroke="#111111" stroke-width="8"/>

  <!-- Pixel grid: each rect is one pixel-block at 56x56, with 32px margin
       and a 8x8 grid (8*56 = 448, centered with 32px margin each side).
       Origin of pixel grid: (32, 32). Pixel (c, r) at (32 + c*56, 32 + r*56). -->

  <!-- "P" — cols 0..2, rows 1..5 (3 wide x 5 tall)
       Row 1: P P P
       Row 2: P . P
       Row 3: P P P
       Row 4: P . .
       Row 5: P . . -->
  <!-- Row 1 -->
  <rect x="32"  y="88"  width="56" height="56" fill="#111111"/>
  <rect x="88"  y="88"  width="56" height="56" fill="#111111"/>
  <rect x="144" y="88"  width="56" height="56" fill="#111111"/>
  <!-- Row 2 -->
  <rect x="32"  y="144" width="56" height="56" fill="#111111"/>
  <rect x="144" y="144" width="56" height="56" fill="#111111"/>
  <!-- Row 3 -->
  <rect x="32"  y="200" width="56" height="56" fill="#111111"/>
  <rect x="88"  y="200" width="56" height="56" fill="#111111"/>
  <rect x="144" y="200" width="56" height="56" fill="#111111"/>
  <!-- Row 4 -->
  <rect x="32"  y="256" width="56" height="56" fill="#111111"/>
  <!-- Row 5 -->
  <rect x="32"  y="312" width="56" height="56" fill="#111111"/>

  <!-- "L" — cols 4..6, rows 1..5 (3 wide x 5 tall)
       Row 1: L . .
       Row 2: L . .
       Row 3: L . .
       Row 4: L . .
       Row 5: L L L -->
  <!-- Row 1 -->
  <rect x="256" y="88"  width="56" height="56" fill="#111111"/>
  <!-- Row 2 -->
  <rect x="256" y="144" width="56" height="56" fill="#111111"/>
  <!-- Row 3 -->
  <rect x="256" y="200" width="56" height="56" fill="#111111"/>
  <!-- Row 4 -->
  <rect x="256" y="256" width="56" height="56" fill="#111111"/>
  <!-- Row 5 -->
  <rect x="256" y="312" width="56" height="56" fill="#111111"/>
  <rect x="312" y="312" width="56" height="56" fill="#111111"/>
  <rect x="368" y="312" width="56" height="56" fill="#111111"/>

  <!-- Coral accent pixel — col 7, row 6 (bottom-right "period" punctuation) -->
  <rect x="424" y="368" width="56" height="56" fill="#ff5d7a"/>
</svg>

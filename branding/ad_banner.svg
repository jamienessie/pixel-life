<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 628" shape-rendering="crispEdges">
  <!--
    Pixel Town — Ad Banner
    Size: 1200×628 (Facebook/Twitter/LinkedIn standard)
    Layout (per brand brief §11):
      Left 600px: gameplay vignette (farming scene)
      Separator: 8px brand_teal panel
      Right 592px: brand_teal panel, horizontal logo, tagline, CTA
  -->

  <!-- Left panel: gameplay scene -->
  <rect width="600" height="628" fill="#A8DADC"/>

  <!-- Sky gradient -->
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#A8DADC"/>
      <stop offset="100%" stop-color="#F5C26B" stop-opacity="0.7"/>
    </linearGradient>
    <linearGradient id="soil" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6A994E"/>
      <stop offset="40%" stop-color="#3A2A1B"/>
    </linearGradient>
  </defs>
  <rect width="600" height="628" fill="url(#sky)"/>

  <!-- Sun -->
  <circle cx="480" cy="120" r="56" fill="#F5C26B" opacity="0.95"/>
  <circle cx="480" cy="120" r="72" fill="#F5C26B" opacity="0.2"/>

  <!-- Ground / farm field -->
  <rect x="0" y="380" width="600" height="248" fill="url(#soil)"/>

  <!-- Farm rows (tilled soil) -->
  <g fill="#3A2A1B" opacity="0.25">
    <rect x="0" y="380" width="600" height="2"/>
    <rect x="0" y="412" width="600" height="2"/>
    <rect x="0" y="444" width="600" height="2"/>
    <rect x="0" y="476" width="600" height="2"/>
    <rect x="0" y="508" width="600" height="2"/>
    <rect x="0" y="540" width="600" height="2"/>
    <rect x="0" y="572" width="600" height="2"/>
    <rect x="0" y="604" width="600" height="2"/>
  </g>

  <!-- Farmhouse (background, left) -->
  <g transform="translate(32, 160)">
    <rect x="0" y="80" width="144" height="160" fill="#EAE0CC"/>
    <rect x="0" y="80" width="144" height="3" fill="#3A2A1B"/>
    <polygon points="72,0 144,80 0,80" fill="#C84630"/>
    <rect x="0" y="77" width="144" height="3" fill="#3A2A1B"/>
    <rect x="52" y="160" width="40" height="80" fill="#3A2A1B"/>
    <rect x="58" y="168" width="28" height="32" fill="#A8DADC"/>
    <rect x="8" y="96" width="48" height="48" fill="#3A2A1B"/>
    <rect x="12" y="100" width="40" height="40" fill="#F5C26B" opacity="0.8"/>
    <rect x="32" y="100" width="4" height="40" fill="#3A2A1B"/>
    <rect x="12" y="120" width="40" height="4" fill="#3A2A1B"/>
    <rect x="88" y="96" width="48" height="48" fill="#3A2A1B"/>
    <rect x="92" y="100" width="40" height="40" fill="#F5C26B" opacity="0.8"/>
    <rect x="112" y="100" width="4" height="40" fill="#3A2A1B"/>
    <rect x="92" y="120" width="40" height="4" fill="#3A2A1B"/>
    <rect x="44" y="48" width="16" height="48" fill="#B7AB98"/>
    <rect x="40" y="44" width="24" height="6" fill="#3A2A1B"/>
  </g>

  <!-- Fence posts -->
  <g fill="#B7AB98">
    <rect x="0" y="344" width="600" height="10"/>
    <rect x="0" y="354" width="600" height="3" fill="#3A2A1B"/>
    <rect x="32" y="316" width="10" height="44"/>  <rect x="80" y="316" width="10" height="44"/>
    <rect x="128" y="316" width="10" height="44"/> <rect x="176" y="316" width="10" height="44"/>
    <rect x="224" y="316" width="10" height="44"/> <rect x="272" y="316" width="10" height="44"/>
    <rect x="320" y="316" width="10" height="44"/> <rect x="368" y="316" width="10" height="44"/>
    <rect x="416" y="316" width="10" height="44"/> <rect x="464" y="316" width="10" height="44"/>
    <rect x="512" y="316" width="10" height="44"/> <rect x="560" y="316" width="10" height="44"/>
  </g>
  <rect x="0" y="330" width="600" height="6" fill="#B7AB98"/>
  <rect x="0" y="328" width="600" height="2" fill="#3A2A1B"/>
  <rect x="0" y="336" width="600" height="2" fill="#3A2A1B"/>

  <!-- Crops: row 1 — mature tomatoes -->
  <g transform="translate(0, 388)">
    <g transform="translate(48,0)">
      <!-- Tomato plant -->
      <rect x="10" y="4" width="4" height="20" fill="#6A994E"/>
      <rect x="4" y="0" width="16" height="12" fill="#6A994E"/>
      <rect x="6" y="-4" width="12" height="8" fill="#6A994E"/>
      <circle cx="12" cy="18" r="6" fill="#C84630"/>
      <rect x="9" y="13" width="6" height="3" fill="#6A994E"/>
    </g>
    <g transform="translate(112,0)">
      <rect x="10" y="4" width="4" height="20" fill="#6A994E"/>
      <rect x="4" y="0" width="16" height="12" fill="#6A994E"/>
      <rect x="6" y="-4" width="12" height="8" fill="#6A994E"/>
      <circle cx="12" cy="18" r="6" fill="#C84630"/>
      <rect x="9" y="13" width="6" height="3" fill="#6A994E"/>
    </g>
    <g transform="translate(176,0)">
      <rect x="10" y="4" width="4" height="20" fill="#6A994E"/>
      <rect x="4" y="0" width="16" height="12" fill="#6A994E"/>
      <circle cx="12" cy="18" r="6" fill="#C84630"/>
      <rect x="9" y="13" width="6" height="3" fill="#6A994E"/>
    </g>
    <g transform="translate(240,0)">
      <rect x="10" y="4" width="4" height="20" fill="#6A994E"/>
      <rect x="4" y="0" width="16" height="12" fill="#6A994E"/>
      <circle cx="12" cy="18" r="6" fill="#C84630"/>
    </g>
    <g transform="translate(304,0)">
      <!-- Young seedling -->
      <rect x="12" y="8" width="4" height="16" fill="#6A994E"/>
      <rect x="8" y="4" width="8" height="8" fill="#6A994E"/>
    </g>
    <g transform="translate(368,0)">
      <rect x="12" y="8" width="4" height="16" fill="#6A994E"/>
      <rect x="8" y="4" width="8" height="8" fill="#6A994E"/>
    </g>
    <g transform="translate(432,0)">
      <rect x="12" y="12" width="4" height="12" fill="#6A994E"/>
    </g>
    <g transform="translate(496,0)">
      <rect x="12" y="12" width="4" height="12" fill="#6A994E"/>
    </g>
  </g>

  <!-- Player character (watering) -->
  <g transform="translate(264, 370)">
    <ellipse cx="32" cy="96" rx="20" ry="6" fill="#3A2A1B" opacity="0.35"/>
    <!-- Body -->
    <rect x="10" y="44" width="36" height="44" fill="#2E6E78"/>
    <rect x="10" y="44" width="36" height="3" fill="#3A2A1B"/>
    <!-- Head -->
    <rect x="12" y="16" width="28" height="28" fill="#F8EDD4"/>
    <rect x="10" y="14" width="32" height="32" fill="none" stroke="#3A2A1B" stroke-width="3"/>
    <!-- Hat brim -->
    <rect x="6" y="14" width="40" height="5" fill="#F5C26B"/>
    <rect x="12" y="4" width="24" height="14" fill="#F5C26B"/>
    <rect x="6" y="12" width="40" height="3" fill="#3A2A1B"/>
    <!-- Eyes -->
    <rect x="17" y="26" width="5" height="5" fill="#3A2A1B"/>
    <rect x="30" y="26" width="5" height="5" fill="#3A2A1B"/>
    <!-- Legs -->
    <rect x="14" y="86" width="12" height="18" fill="#3A2A1B"/>
    <rect x="30" y="86" width="12" height="18" fill="#3A2A1B"/>
    <rect x="10" y="100" width="16" height="6" fill="#3A2A1B"/>
    <rect x="30" y="100" width="16" height="6" fill="#3A2A1B"/>
    <!-- Arm with watering can -->
    <rect x="-20" y="50" width="30" height="12" fill="#2E6E78"/>
    <!-- Watering can -->
    <rect x="-48" y="38" width="28" height="22" fill="#B7AB98"/>
    <rect x="-50" y="36" width="32" height="26" fill="none" stroke="#3A2A1B" stroke-width="3"/>
    <rect x="-66" y="44" width="18" height="6" fill="#B7AB98"/>
    <!-- Water drops -->
    <g fill="#A8DADC">
      <rect x="-68" y="66" width="4" height="8"/>
      <rect x="-58" y="70" width="4" height="8"/>
      <rect x="-48" y="64" width="4" height="8"/>
    </g>
  </g>

  <!-- Panel separator -->
  <rect x="596" y="0" width="8" height="628" fill="#3A2A1B"/>

  <!-- Right panel: brand -->
  <rect x="604" y="0" width="596" height="628" fill="#2E6E78"/>

  <!-- Decorative pixel pattern top-right corner -->
  <g fill="#F8EDD4" opacity="0.06" shape-rendering="crispEdges">
    <rect x="900" y="0" width="16" height="16"/>
    <rect x="932" y="0" width="16" height="16"/>
    <rect x="964" y="0" width="16" height="16"/>
    <rect x="996" y="0" width="16" height="16"/>
    <rect x="1028" y="0" width="16" height="16"/>
    <rect x="1060" y="0" width="16" height="16"/>
    <rect x="1092" y="0" width="16" height="16"/>
    <rect x="1124" y="0" width="16" height="16"/>
    <rect x="1156" y="0" width="16" height="16"/>
    <rect x="1188" y="0" width="16" height="16"/>
    <rect x="916" y="16" width="16" height="16"/>
    <rect x="948" y="16" width="16" height="16"/>
    <rect x="980" y="16" width="16" height="16"/>
    <rect x="1012" y="16" width="16" height="16"/>
    <rect x="1044" y="16" width="16" height="16"/>
    <rect x="1076" y="16" width="16" height="16"/>
    <rect x="1108" y="16" width="16" height="16"/>
    <rect x="1140" y="16" width="16" height="16"/>
    <rect x="1172" y="16" width="16" height="16"/>
    <rect x="900" y="32" width="16" height="16"/>
    <rect x="932" y="32" width="16" height="16"/>
    <rect x="964" y="32" width="16" height="16"/>
    <rect x="996" y="32" width="16" height="16"/>
    <rect x="1028" y="32" width="16" height="16"/>
  </g>

  <!-- Horizontal wordmark: "PIXEL TOWN" scaled 8× (58×11 → 464×88)
       Centered in right panel: x = 604 + (596-464)/2 = 604+66 = 670, y = 220 -->
  <g transform="translate(670, 240) scale(8)" fill="#F8EDD4" shape-rendering="crispEdges">
    <!-- P -->
    <g transform="translate(2,2)">
      <path d="M0,0 h4 v1 h-4 Z M0,1 h1 v2 h-1 Z M4,1 h1 v2 h-1 Z M0,3 h4 v1 h-4 Z M0,4 h1 v3 h-1 Z"/>
    </g>
    <!-- I -->
    <g transform="translate(8,2)">
      <path d="M0,0 h3 v1 h-3 Z M1,1 h1 v5 h-1 Z M0,6 h3 v1 h-3 Z"/>
    </g>
    <!-- X -->
    <g transform="translate(12,2)">
      <path d="M0,0 h1 v1 h-1 Z M4,0 h1 v1 h-1 Z M1,1 h1 v2 h-1 Z M3,1 h1 v2 h-1 Z M2,3 h1 v1 h-1 Z M1,4 h1 v2 h-1 Z M3,4 h1 v2 h-1 Z M0,6 h1 v1 h-1 Z M4,6 h1 v1 h-1 Z"/>
    </g>
    <!-- E -->
    <g transform="translate(18,2)">
      <path d="M0,0 h5 v1 h-5 Z M0,1 h1 v2 h-1 Z M0,3 h4 v1 h-4 Z M0,4 h1 v2 h-1 Z M0,6 h5 v1 h-5 Z"/>
    </g>
    <!-- L -->
    <g transform="translate(24,2)">
      <path d="M0,0 h1 v6 h-1 Z M0,6 h5 v1 h-5 Z"/>
    </g>
    <!-- T -->
    <g transform="translate(33,2)">
      <path d="M0,0 h5 v1 h-5 Z M2,1 h1 v6 h-1 Z"/>
    </g>
    <!-- O -->
    <g transform="translate(39,2)">
      <path d="M1,0 h3 v1 h-3 Z M0,1 h1 v5 h-1 Z M4,1 h1 v5 h-1 Z M1,6 h3 v1 h-3 Z"/>
    </g>
    <!-- W -->
    <g transform="translate(45,2)">
      <path d="M0,0 h1 v4 h-1 Z M4,0 h1 v4 h-1 Z M0,4 h1 v1 h-1 Z M2,4 h1 v1 h-1 Z M4,4 h1 v1 h-1 Z M0,5 h2 v1 h-2 Z M3,5 h2 v1 h-2 Z M0,6 h1 v1 h-1 Z M4,6 h1 v1 h-1 Z"/>
    </g>
    <!-- N -->
    <g transform="translate(51,2)">
      <path d="M0,0 h1 v1 h-1 Z M4,0 h1 v1 h-1 Z M0,1 h2 v1 h-2 Z M4,1 h1 v1 h-1 Z M0,2 h1 v1 h-1 Z M2,2 h1 v1 h-1 Z M4,2 h1 v1 h-1 Z M0,3 h1 v1 h-1 Z M3,3 h2 v1 h-2 Z M0,4 h1 v3 h-1 Z M4,4 h1 v3 h-1 Z"/>
    </g>
  </g>

  <!-- Divider line under logo -->
  <rect x="650" y="344" width="500" height="3" fill="#F8EDD4" opacity="0.3"/>

  <!-- Tagline: pixel text scaled 5× -->
  <!-- "Cozy life sim. Live, love, pass it on." -->
  <text x="900" y="420" font-family="monospace" font-size="28" fill="#F8EDD4" text-anchor="middle" opacity="0.9">Cozy life sim. Live, love, pass it on.</text>

  <!-- Feature bullets as pixel-style list -->
  <g fill="#EAE0CC" font-family="monospace" font-size="22">
    <text x="660" y="480">▸  Farm, fish, cook, craft</text>
    <text x="660" y="510">▸  Fall in love, start a family</text>
    <text x="660" y="540">▸  Your story lives on for generations</text>
  </g>

  <!-- CTA badge -->
  <rect x="696" y="570" width="408" height="44" rx="4" fill="#F5C26B"/>
  <rect x="694" y="568" width="412" height="48" rx="4" fill="none" stroke="#3A2A1B" stroke-width="3"/>
  <text x="900" y="600" font-family="monospace" font-size="22" fill="#3A2A1B" text-anchor="middle" font-weight="bold">Available on Google Play</text>

  <!-- Iconmark (bottom-right) -->
  <g transform="translate(1128, 20) scale(6)" fill="#F8EDD4" shape-rendering="crispEdges" opacity="0.7">
    <rect width="16" height="16" fill="#3A2A1B" opacity="0.2"/>
    <path d="M4,4 h4 v1 h-4 Z M4,5 h1 v2 h-1 Z M7,5 h1 v2 h-1 Z M4,7 h4 v1 h-4 Z M4,8 h1 v3 h-1 Z"/>
    <path d="M8,5 h5 v1 h-5 Z M10,6 h1 v6 h-1 Z"/>
  </g>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 500" shape-rendering="crispEdges">
  <!--
    Pixel Town — Google Play Feature Graphic
    Size: 1024×500 (required spec: no text in outer 100px gutters, no transparency)
    Layout:
      - Full-width dusk townscape (pixel art)
      - Centered logo + tagline (safe zone: x 100-924, y 50-450)
      - Brand_teal sky + dusk atmosphere
  -->
  <defs>
    <linearGradient id="feat_sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#A8DADC"/>
      <stop offset="50%" stop-color="#F5C26B" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#6D5A7E"/>
    </linearGradient>
    <linearGradient id="feat_ground" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6A994E"/>
      <stop offset="100%" stop-color="#3A2A1B"/>
    </linearGradient>
  </defs>

  <!-- Sky -->
  <rect width="1024" height="500" fill="url(#feat_sky)"/>

  <!-- Dusk sun (right side, above safe zone) -->
  <circle cx="860" cy="140" r="64" fill="#F5C26B" opacity="0.85"/>
  <circle cx="860" cy="140" r="80" fill="#F5C26B" opacity="0.2"/>
  <circle cx="860" cy="140" r="110" fill="#F5C26B" opacity="0.08"/>

  <!-- Ground strip -->
  <rect x="0" y="360" width="1024" height="140" fill="url(#feat_ground)"/>
  <rect x="0" y="360" width="1024" height="3" fill="#3A2A1B" opacity="0.5"/>

  <!-- Cobblestone path (center) -->
  <rect x="400" y="360" width="224" height="140" fill="#B7AB98"/>
  <g fill="#3A2A1B" opacity="0.2">
    <rect x="400" y="360" width="224" height="1"/>
    <rect x="400" y="392" width="224" height="1"/>
    <rect x="400" y="424" width="224" height="1"/>
    <rect x="400" y="456" width="224" height="1"/>
    <rect x="400" y="488" width="224" height="1"/>
    <rect x="400" y="360" width="1" height="140"/>
    <rect x="456" y="360" width="1" height="140"/>
    <rect x="512" y="360" width="1" height="140"/>
    <rect x="568" y="360" width="1" height="140"/>
    <rect x="624" y="360" width="1" height="140"/>
  </g>

  <!-- ===== BUILDINGS ===== -->
  <!-- Left building (bakery / shop) -->
  <g transform="translate(48, 180)">
    <rect x="0" y="96" width="200" height="220" fill="#EAE0CC"/>
    <rect x="0" y="96" width="200" height="3" fill="#3A2A1B"/>
    <polygon points="100,0 200,96 0,96" fill="#C84630"/>
    <rect x="0" y="93" width="200" height="3" fill="#3A2A1B"/>
    <rect x="148" y="-24" width="24" height="56" fill="#B7AB98"/>
    <rect x="144" y="-28" width="32" height="6" fill="#3A2A1B"/>
    <rect x="72" y="192" width="56" height="124" fill="#3A2A1B"/>
    <rect x="80" y="200" width="40" height="48" fill="#2E6E78"/>
    <rect x="12" y="120" width="64" height="56" fill="#3A2A1B"/>
    <rect x="16" y="124" width="56" height="48" fill="#A8DADC"/>
    <rect x="44" y="124" width="4" height="48" fill="#3A2A1B"/>
    <rect x="16" y="148" width="56" height="4" fill="#3A2A1B"/>
    <rect x="124" y="120" width="64" height="56" fill="#3A2A1B"/>
    <rect x="128" y="124" width="56" height="48" fill="#A8DADC"/>
    <rect x="156" y="124" width="4" height="48" fill="#3A2A1B"/>
    <rect x="128" y="148" width="56" height="4" fill="#3A2A1B"/>
    <!-- Awning -->
    <rect x="56" y="184" width="88" height="16" fill="#E07A5F"/>
    <rect x="54" y="182" width="92" height="20" fill="none" stroke="#3A2A1B" stroke-width="2"/>
    <!-- Sign -->
    <rect x="64" y="200" width="72" height="32" fill="#F5C26B"/>
    <rect x="62" y="198" width="76" height="36" fill="none" stroke="#3A2A1B" stroke-width="2"/>
  </g>

  <!-- Center building (town hall — grand) -->
  <g transform="translate(312, 80)">
    <rect x="0" y="160" width="400" height="300" fill="#EAE0CC"/>
    <rect x="0" y="160" width="400" height="4" fill="#3A2A1B"/>
    <polygon points="200,0 400,160 0,160" fill="#2E6E78"/>
    <rect x="0" y="156" width="400" height="4" fill="#3A2A1B"/>
    <!-- Flagpole -->
    <rect x="196" y="-56" width="6" height="80" fill="#3A2A1B"/>
    <rect x="202" y="-56" width="56" height="28" fill="#F8EDD4"/>
    <rect x="202" y="-56" width="56" height="3" fill="#3A2A1B"/>
    <rect x="258" y="-56" width="3" height="28" fill="#3A2A1B"/>
    <!-- Chimney -->
    <rect x="64" y="64" width="24" height="104" fill="#B7AB98"/>
    <rect x="60" y="60" width="32" height="6" fill="#3A2A1B"/>
    <!-- Main door (double) -->
    <rect x="152" y="360" width="96" height="180" fill="#3A2A1B"/>
    <rect x="160" y="368" width="36" height="72" fill="#A8DADC"/>
    <rect x="204" y="368" width="36" height="72" fill="#A8DADC"/>
    <!-- Windows (row 1) -->
    <rect x="16" y="200" width="72" height="64" fill="#3A2A1B"/>
    <rect x="20" y="204" width="64" height="56" fill="#A8DADC"/>
    <rect x="52" y="204" width="4" height="56" fill="#3A2A1B"/>
    <rect x="20" y="232" width="64" height="4" fill="#3A2A1B"/>
    <rect x="312" y="200" width="72" height="64" fill="#3A2A1B"/>
    <rect x="316" y="204" width="64" height="56" fill="#A8DADC"/>
    <rect x="348" y="204" width="4" height="56" fill="#3A2A1B"/>
    <rect x="316" y="232" width="64" height="4" fill="#3A2A1B"/>
    <!-- Windows (row 2 - lit) -->
    <rect x="16" y="296" width="72" height="64" fill="#3A2A1B"/>
    <rect x="20" y="300" width="64" height="56" fill="#F5C26B" opacity="0.9"/>
    <rect x="52" y="300" width="4" height="56" fill="#3A2A1B"/>
    <rect x="20" y="328" width="64" height="4" fill="#3A2A1B"/>
    <rect x="312" y="296" width="72" height="64" fill="#3A2A1B"/>
    <rect x="316" y="300" width="64" height="56" fill="#F5C26B" opacity="0.9"/>
    <rect x="348" y="300" width="4" height="56" fill="#3A2A1B"/>
    <rect x="316" y="328" width="64" height="4" fill="#3A2A1B"/>
    <!-- Hanging sign -->
    <rect x="152" y="296" width="96" height="40" fill="#F5C26B"/>
    <rect x="150" y="294" width="100" height="44" fill="none" stroke="#3A2A1B" stroke-width="3"/>
  </g>

  <!-- Right building (house) -->
  <g transform="translate(776, 200)">
    <rect x="0" y="80" width="200" height="200" fill="#F8EDD4"/>
    <rect x="0" y="80" width="200" height="3" fill="#3A2A1B"/>
    <polygon points="100,0 200,80 0,80" fill="#2E6E78"/>
    <rect x="0" y="77" width="200" height="3" fill="#3A2A1B"/>
    <rect x="72" y="216" width="56" height="104" fill="#3A2A1B"/>
    <rect x="80" y="224" width="40" height="40" fill="#A8DADC"/>
    <rect x="12" y="104" width="56" height="56" fill="#3A2A1B"/>
    <rect x="16" y="108" width="48" height="48" fill="#F5C26B" opacity="0.8"/>
    <rect x="40" y="108" width="4" height="48" fill="#3A2A1B"/>
    <rect x="16" y="132" width="48" height="4" fill="#3A2A1B"/>
    <rect x="132" y="104" width="56" height="56" fill="#3A2A1B"/>
    <rect x="136" y="108" width="48" height="48" fill="#F5C26B" opacity="0.8"/>
    <rect x="160" y="108" width="4" height="48" fill="#3A2A1B"/>
    <rect x="136" y="132" width="48" height="4" fill="#3A2A1B"/>
    <!-- Flower box -->
    <rect x="12" y="160" width="56" height="12" fill="#E07A5F"/>
    <rect x="132" y="160" width="56" height="12" fill="#E07A5F"/>
  </g>

  <!-- Trees flanking path -->
  <g transform="translate(344, 284)">
    <rect x="12" y="64" width="12" height="76" fill="#3A2A1B"/>
    <rect x="0" y="28" width="36" height="52" fill="#6A994E"/>
    <rect x="6" y="8" width="24" height="36" fill="#6A994E"/>
    <rect x="10" y="0" width="16" height="20" fill="#6A994E"/>
  </g>
  <g transform="translate(668, 284)">
    <rect x="12" y="64" width="12" height="76" fill="#3A2A1B"/>
    <rect x="0" y="28" width="36" height="52" fill="#6A994E"/>
    <rect x="6" y="8" width="24" height="36" fill="#6A994E"/>
    <rect x="10" y="0" width="16" height="20" fill="#6A994E"/>
  </g>

  <!-- Player + NPC characters on path -->
  <g transform="translate(448, 344)">
    <!-- Player -->
    <ellipse cx="24" cy="96" rx="16" ry="5" fill="#3A2A1B" opacity="0.3"/>
    <rect x="8" y="44" width="28" height="36" fill="#2E6E78"/>
    <rect x="8" y="44" width="28" height="3" fill="#3A2A1B"/>
    <rect x="10" y="18" width="24" height="24" fill="#F8EDD4"/>
    <rect x="8" y="16" width="28" height="28" fill="none" stroke="#3A2A1B" stroke-width="2"/>
    <rect x="8" y="16" width="28" height="8" fill="#F5C26B"/>
    <rect x="12" y="26" width="5" height="5" fill="#3A2A1B"/>
    <rect x="27" y="26" width="5" height="5" fill="#3A2A1B"/>
    <rect x="10" y="80" width="10" height="16" fill="#3A2A1B"/>
    <rect x="24" y="80" width="10" height="16" fill="#3A2A1B"/>
    <rect x="6" y="92" width="14" height="6" fill="#3A2A1B"/>
    <rect x="24" y="92" width="14" height="6" fill="#3A2A1B"/>
    <!-- Heart above -->
    <g fill="#E07A5F" transform="translate(12,-20)">
      <rect x="0" y="4" width="4" height="4"/><rect x="4" y="0" width="4" height="4"/>
      <rect x="4" y="4" width="4" height="4"/><rect x="8" y="4" width="4" height="4"/>
      <rect x="0" y="8" width="12" height="8"/><rect x="2" y="16" width="8" height="4"/>
      <rect x="4" y="20" width="4" height="4"/>
    </g>
  </g>
  <g transform="translate(528, 348)">
    <!-- NPC partner -->
    <ellipse cx="22" cy="88" rx="14" ry="5" fill="#3A2A1B" opacity="0.3"/>
    <rect x="6" y="40" width="26" height="32" fill="#E07A5F"/>
    <rect x="6" y="40" width="26" height="3" fill="#3A2A1B"/>
    <rect x="8" y="16" width="22" height="22" fill="#F8EDD4"/>
    <rect x="6" y="14" width="26" height="26" fill="none" stroke="#3A2A1B" stroke-width="2"/>
    <rect x="6" y="14" width="26" height="8" fill="#3A2A1B"/>
    <rect x="10" y="22" width="4" height="4" fill="#3A2A1B"/>
    <rect x="24" y="22" width="4" height="4" fill="#3A2A1B"/>
    <rect x="8" y="72" width="8" height="16" fill="#3A2A1B"/>
    <rect x="22" y="72" width="8" height="16" fill="#3A2A1B"/>
    <!-- Flower gift -->
    <g transform="translate(-8, 36)">
      <rect x="4" y="0" width="3" height="16" fill="#6A994E"/>
      <rect x="0" y="-8" width="5" height="6" fill="#E07A5F"/>
      <rect x="6" y="-8" width="5" height="6" fill="#E07A5F"/>
      <rect x="3" y="-12" width="5" height="6" fill="#E07A5F"/>
    </g>
  </g>

  <!-- Dusk atmospheric overlay -->
  <rect x="0" y="240" width="1024" height="260" fill="#6D5A7E" opacity="0.18"/>

  <!-- ========================
       CENTERED LOGO & TAGLINE
       Safe zone: x 100-924, y 50-450
       ======================== -->

  <!-- Semi-transparent backing pill for legibility -->
  <rect x="212" y="100" width="600" height="180" rx="8" fill="#2E6E78" opacity="0.82"/>
  <rect x="210" y="98" width="604" height="184" rx="8" fill="none" stroke="#3A2A1B" stroke-width="3"/>

  <!-- Stacked logo scaled 8× (33×21 → 264×168), centered in pill: x=212+(600-264)/2=380, y=100+(180-168)/2=106 -->
  <g transform="translate(380, 106) scale(8)" fill="#F8EDD4" shape-rendering="crispEdges">
    <!-- PIXEL -->
    <path d="M0,0 h4 v1 h-4 Z M0,1 h1 v2 h-1 Z M4,1 h1 v2 h-1 Z M0,3 h4 v1 h-4 Z M0,4 h1 v3 h-1 Z"/>
    <path d="M6,0 h3 v1 h-3 Z M7,1 h1 v5 h-1 Z M6,6 h3 v1 h-3 Z"/>
    <path d="M10,0 h1 v1 h-1 Z M14,0 h1 v1 h-1 Z M11,1 h1 v2 h-1 Z M13,1 h1 v2 h-1 Z M12,3 h1 v1 h-1 Z M11,4 h1 v2 h-1 Z M13,4 h1 v2 h-1 Z M10,6 h1 v1 h-1 Z M14,6 h1 v1 h-1 Z"/>
    <path d="M16,0 h5 v1 h-5 Z M16,1 h1 v2 h-1 Z M16,3 h4 v1 h-4 Z M16,4 h1 v2 h-1 Z M16,6 h5 v1 h-5 Z"/>
    <path d="M22,0 h1 v6 h-1 Z M22,6 h5 v1 h-5 Z"/>
    <!-- TOWN -->
    <path d="M2,10 h5 v1 h-5 Z M4,11 h1 v6 h-1 Z"/>
    <path d="M10,10 h3 v1 h-3 Z M9,11 h1 v5 h-1 Z M13,11 h1 v5 h-1 Z M10,16 h3 v1 h-3 Z"/>
    <path d="M15,10 h1 v4 h-1 Z M19,10 h1 v4 h-1 Z M15,14 h1 v1 h-1 Z M17,14 h1 v1 h-1 Z M19,14 h1 v1 h-1 Z M15,15 h2 v1 h-2 Z M18,15 h2 v1 h-2 Z M15,16 h1 v1 h-1 Z M19,16 h1 v1 h-1 Z"/>
    <path d="M21,10 h1 v1 h-1 Z M25,10 h1 v1 h-1 Z M21,11 h2 v1 h-2 Z M25,11 h1 v1 h-1 Z M21,12 h1 v1 h-1 Z M23,12 h1 v1 h-1 Z M25,12 h1 v1 h-1 Z M21,13 h1 v1 h-1 Z M24,13 h2 v1 h-2 Z M21,14 h1 v3 h-1 Z M25,14 h1 v3 h-1 Z"/>
  </g>

  <!-- Tagline below logo pill -->
  <rect x="282" y="300" width="460" height="56" rx="4" fill="#F8EDD4" opacity="0.9"/>
  <rect x="280" y="298" width="464" height="60" rx="4" fill="none" stroke="#3A2A1B" stroke-width="2"/>
  <text x="512" y="337" font-family="monospace" font-size="26" fill="#3A2A1B" text-anchor="middle">Plant, love, pass it on.</text>

  <!-- Google Play badge (bottom-right, inside safe zone) -->
  <rect x="756" y="390" width="152" height="36" rx="4" fill="#3A2A1B" opacity="0.7"/>
  <text x="832" y="414" font-family="monospace" font-size="16" fill="#F8EDD4" text-anchor="middle">▶ Google Play</text>
</svg>

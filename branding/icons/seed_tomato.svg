<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" shape-rendering="crispEdges">
  <!-- Tomato Seed — 16×16 in-game icon
       Style: 1px deep_brown outline, 3-tone shading, forest accent stripe bottom-left -->
  <!-- Outline background -->
  <rect width="16" height="16" fill="transparent"/>
  <!-- Category stripe: seeds = forest (#6A994E), bottom-left 2px -->
  <rect x="0" y="14" width="2" height="2" fill="#6A994E"/>
  <!-- Seed shape: oval packet -->
  <!-- Packet body -->
  <rect x="2" y="4" width="12" height="8" fill="#F8EDD4"/>
  <rect x="3" y="3" width="10" height="10" fill="#F8EDD4"/>
  <rect x="4" y="2" width="8" height="12" fill="#F8EDD4"/>
  <!-- Outline -->
  <rect x="2" y="3" width="12" height="1" fill="#3A2A1B"/>
  <rect x="2" y="12" width="12" height="1" fill="#3A2A1B"/>
  <rect x="1" y="4" width="1" height="8" fill="#3A2A1B"/>
  <rect x="14" y="4" width="1" height="8" fill="#3A2A1B"/>
  <rect x="3" y="2" width="10" height="1" fill="#3A2A1B"/>
  <rect x="3" y="13" width="10" height="1" fill="#3A2A1B"/>
  <!-- Seed graphic: mini tomato on packet -->
  <rect x="6" y="6" width="4" height="4" fill="#C84630"/>
  <rect x="5" y="7" width="6" height="2" fill="#C84630"/>
  <rect x="6" y="5" width="4" height="1" fill="#6A994E"/>
  <rect x="7" y="4" width="2" height="2" fill="#6A994E"/>
  <!-- Highlight -->
  <rect x="4" y="4" width="2" height="1" fill="#EAE0CC"/>
  <!-- Shadow -->
  <rect x="10" y="11" width="4" height="1" fill="#DAD2BC"/>
  <rect x="12" y="4" width="2" height="7" fill="#DAD2BC"/>
</svg>

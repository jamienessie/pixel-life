<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" shape-rendering="crispEdges">
  <!-- Tomato (food) — 16×16 in-game icon -->
  <rect width="16" height="16" fill="transparent"/>
  <!-- Category: food = sun_gold (#F5C26B) -->
  <rect x="0" y="14" width="2" height="2" fill="#F5C26B"/>
  <!-- Stem + leaf -->
  <rect x="7" y="1" width="2" height="3" fill="#6A994E"/>
  <rect x="5" y="2" width="3" height="2" fill="#6A994E"/>
  <rect x="8" y="2" width="3" height="2" fill="#6A994E"/>
  <!-- Tomato body outline -->
  <rect x="3" y="4" width="10" height="1" fill="#3A2A1B"/>
  <rect x="2" y="5" width="12" height="1" fill="#3A2A1B"/>
  <rect x="1" y="6" width="1" height="6" fill="#3A2A1B"/>
  <rect x="14" y="6" width="1" height="6" fill="#3A2A1B"/>
  <rect x="2" y="12" width="12" height="1" fill="#3A2A1B"/>
  <rect x="3" y="13" width="10" height="1" fill="#3A2A1B"/>
  <!-- Tomato body fill -->
  <rect x="2" y="5" width="12" height="8" fill="#C84630"/>
  <rect x="3" y="4" width="10" height="9" fill="#C84630"/>
  <rect x="4" y="4" width="8" height="10" fill="#C84630"/>
  <!-- Highlight (top-left) -->
  <rect x="3" y="5" width="3" height="2" fill="#E07A5F"/>
  <rect x="4" y="5" width="2" height="1" fill="#F8EDD4" opacity="0.6"/>
  <!-- Mid tone -->
  <rect x="3" y="8" width="3" height="3" fill="#E07A5F"/>
  <!-- Shadow (bottom-right) -->
  <rect x="10" y="10" width="3" height="2" fill="#3A2A1B" opacity="0.25"/>
  <rect x="9" y="11" width="4" height="1" fill="#3A2A1B" opacity="0.2"/>
</svg>

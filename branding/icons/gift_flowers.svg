<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" shape-rendering="crispEdges">
  <!-- Bouquet of Flowers (relationship gift) — 16×16 in-game icon -->
  <rect width="16" height="16" fill="transparent"/>
  <!-- Category: relationship gifts = tomato (#E07A5F) -->
  <rect x="0" y="14" width="2" height="2" fill="#E07A5F"/>
  <!-- Stems -->
  <rect x="7" y="10" width="2" height="5" fill="#6A994E"/>
  <rect x="5" y="9" width="2" height="4" fill="#6A994E"/>
  <rect x="9" y="9" width="2" height="4" fill="#6A994E"/>
  <!-- Wrap / ribbon -->
  <rect x="5" y="12" width="6" height="3" fill="#E07A5F"/>
  <rect x="4" y="11" width="8" height="1" fill="#3A2A1B"/>
  <rect x="4" y="14" width="8" height="1" fill="#3A2A1B"/>
  <rect x="4" y="11" width="1" height="4" fill="#3A2A1B"/>
  <rect x="11" y="11" width="1" height="4" fill="#3A2A1B"/>
  <!-- Ribbon bow highlight -->
  <rect x="7" y="12" width="2" height="1" fill="#F8EDD4" opacity="0.5"/>
  <!-- Flower center (tomato) -->
  <rect x="6" y="4" width="4" height="4" fill="#E07A5F"/>
  <rect x="5" y="5" width="6" height="2" fill="#E07A5F"/>
  <rect x="7" y="3" width="2" height="2" fill="#F5C26B"/>
  <rect x="6" y="3" width="4" height="1" fill="#3A2A1B"/>
  <rect x="5" y="4" width="1" height="4" fill="#3A2A1B"/>
  <rect x="11" y="4" width="1" height="4" fill="#3A2A1B"/>
  <rect x="6" y="8" width="4" height="1" fill="#3A2A1B"/>
  <!-- Left flower (small, forest) -->
  <rect x="2" y="5" width="3" height="3" fill="#6A994E"/>
  <rect x="1" y="6" width="5" height="1" fill="#6A994E"/>
  <rect x="3" y="4" width="1" height="1" fill="#F5C26B"/>
  <rect x="1" y="5" width="1" height="4" fill="#3A2A1B"/>
  <rect x="5" y="5" width="1" height="4" fill="#3A2A1B"/>
  <rect x="2" y="4" width="3" height="1" fill="#3A2A1B"/>
  <rect x="2" y="8" width="3" height="1" fill="#3A2A1B"/>
  <!-- Right flower (small, sky) -->
  <rect x="11" y="5" width="3" height="3" fill="#A8DADC"/>
  <rect x="10" y="6" width="5" height="1" fill="#A8DADC"/>
  <rect x="12" y="4" width="1" height="1" fill="#F5C26B"/>
  <rect x="10" y="5" width="1" height="4" fill="#3A2A1B"/>
  <rect x="14" y="5" width="1" height="4" fill="#3A2A1B"/>
  <rect x="11" y="4" width="3" height="1" fill="#3A2A1B"/>
  <rect x="11" y="8" width="3" height="1" fill="#3A2A1B"/>
</svg>

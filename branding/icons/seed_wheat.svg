<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" shape-rendering="crispEdges">
  <!-- Wheat Seed — 16×16 in-game icon -->
  <rect width="16" height="16" fill="transparent"/>
  <!-- Category: seeds = forest -->
  <rect x="0" y="14" width="2" height="2" fill="#6A994E"/>
  <!-- Wheat stalk -->
  <rect x="7" y="8" width="2" height="7" fill="#6A994E"/>
  <!-- Wheat head kernel shapes -->
  <rect x="5" y="2" width="4" height="3" fill="#F5C26B"/>
  <rect x="4" y="3" width="6" height="2" fill="#F5C26B"/>
  <rect x="7" y="5" width="2" height="3" fill="#6A994E"/>
  <!-- Side grain clusters -->
  <rect x="3" y="5" width="3" height="2" fill="#F5C26B"/>
  <rect x="10" y="5" width="3" height="2" fill="#F5C26B"/>
  <rect x="4" y="7" width="3" height="2" fill="#F5C26B"/>
  <rect x="9" y="7" width="3" height="2" fill="#F5C26B"/>
  <!-- Outlines -->
  <rect x="5" y="1" width="6" height="1" fill="#3A2A1B"/>
  <rect x="4" y="2" width="1" height="3" fill="#3A2A1B"/>
  <rect x="11" y="2" width="1" height="3" fill="#3A2A1B"/>
  <rect x="4" y="5" width="1" height="1" fill="#3A2A1B"/>
  <rect x="11" y="5" width="1" height="1" fill="#3A2A1B"/>
  <!-- Highlight -->
  <rect x="6" y="2" width="2" height="1" fill="#EAE0CC"/>
  <!-- Shadow dither on grain -->
  <rect x="8" y="4" width="1" height="1" fill="#B7AB98"/>
  <rect x="5" y="3" width="1" height="1" fill="#EAE0CC"/>
</svg>

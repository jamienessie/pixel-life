<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" shape-rendering="crispEdges">
  <!-- Bread loaf — 16×16 in-game icon -->
  <rect width="16" height="16" fill="transparent"/>
  <!-- Category: food = sun_gold -->
  <rect x="0" y="14" width="2" height="2" fill="#F5C26B"/>
  <!-- Loaf outline -->
  <rect x="2" y="4" width="12" height="1" fill="#3A2A1B"/>
  <rect x="1" y="5" width="1" height="7" fill="#3A2A1B"/>
  <rect x="14" y="5" width="1" height="7" fill="#3A2A1B"/>
  <rect x="2" y="12" width="12" height="1" fill="#3A2A1B"/>
  <rect x="3" y="3" width="10" height="1" fill="#3A2A1B"/>
  <rect x="5" y="2" width="6" height="1" fill="#3A2A1B"/>
  <!-- Top crust dome -->
  <rect x="4" y="3" width="8" height="2" fill="#F5C26B"/>
  <rect x="5" y="2" width="6" height="1" fill="#F5C26B"/>
  <rect x="3" y="4" width="10" height="1" fill="#F5C26B"/>
  <!-- Body (inner bread) -->
  <rect x="2" y="5" width="12" height="7" fill="#EAE0CC"/>
  <rect x="3" y="5" width="10" height="7" fill="#EAE0CC"/>
  <!-- Crust sides -->
  <rect x="2" y="5" width="1" height="7" fill="#F5C26B"/>
  <rect x="13" y="5" width="1" height="7" fill="#F5C26B"/>
  <rect x="2" y="11" width="12" height="1" fill="#F5C26B"/>
  <!-- Score line on top -->
  <rect x="6" y="3" width="4" height="1" fill="#DAD2BC"/>
  <!-- Highlight -->
  <rect x="4" y="6" width="3" height="1" fill="#F8EDD4"/>
  <!-- Shadow bottom -->
  <rect x="5" y="10" width="8" height="1" fill="#B7AB98"/>
  <rect x="4" y="11" width="9" height="1" fill="#DAD2BC"/>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" shape-rendering="crispEdges">
  <!-- Hoe — 16×16 in-game icon -->
  <rect width="16" height="16" fill="transparent"/>
  <!-- Category: tools = pebble -->
  <rect x="0" y="14" width="2" height="2" fill="#B7AB98"/>
  <!-- Handle (wooden, diagonal) -->
  <rect x="3" y="2" width="2" height="2" fill="#F5C26B"/>
  <rect x="5" y="4" width="2" height="2" fill="#F5C26B"/>
  <rect x="7" y="6" width="2" height="2" fill="#F5C26B"/>
  <rect x="9" y="8" width="2" height="2" fill="#F5C26B"/>
  <rect x="11" y="10" width="2" height="2" fill="#F5C26B"/>
  <!-- Handle outline -->
  <rect x="2" y="2" width="1" height="2" fill="#3A2A1B"/>
  <rect x="3" y="1" width="2" height="1" fill="#3A2A1B"/>
  <rect x="12" y="11" width="2" height="1" fill="#3A2A1B"/>
  <rect x="13" y="10" width="1" height="2" fill="#3A2A1B"/>
  <!-- Hoe head (metal) -->
  <rect x="1" y="10" width="5" height="3" fill="#B7AB98"/>
  <rect x="0" y="9" width="7" height="1" fill="#3A2A1B"/>
  <rect x="0" y="12" width="7" height="1" fill="#3A2A1B"/>
  <rect x="0" y="9" width="1" height="4" fill="#3A2A1B"/>
  <rect x="6" y="9" width="1" height="4" fill="#3A2A1B"/>
  <rect x="0" y="13" width="7" height="1" fill="#3A2A1B"/>
  <!-- Highlight on hoe head -->
  <rect x="1" y="10" width="3" height="1" fill="#EAE0CC"/>
  <!-- Shadow on handle -->
  <rect x="4" y="3" width="1" height="1" fill="#DAD2BC"/>
  <rect x="6" y="5" width="1" height="1" fill="#DAD2BC"/>
  <rect x="8" y="7" width="1" height="1" fill="#DAD2BC"/>
  <rect x="10" y="9" width="1" height="1" fill="#DAD2BC"/>
</svg>

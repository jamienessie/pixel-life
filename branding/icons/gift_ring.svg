<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" shape-rendering="crispEdges">
  <!-- Engagement Ring (relationship gift) — 16×16 in-game icon -->
  <rect width="16" height="16" fill="transparent"/>
  <!-- Category: relationship gifts = tomato -->
  <rect x="0" y="14" width="2" height="2" fill="#E07A5F"/>
  <!-- Ring band outline -->
  <rect x="3" y="8" width="10" height="5" fill="transparent"/>
  <rect x="4" y="8" width="8" height="1" fill="#3A2A1B"/>
  <rect x="4" y="13" width="8" height="1" fill="#3A2A1B"/>
  <rect x="3" y="9" width="1" height="4" fill="#3A2A1B"/>
  <rect x="12" y="9" width="1" height="4" fill="#3A2A1B"/>
  <!-- Band fill (gold) -->
  <rect x="4" y="9" width="8" height="4" fill="#F5C26B"/>
  <!-- Band highlight -->
  <rect x="5" y="9" width="4" height="1" fill="#EAE0CC"/>
  <!-- Band inner shadow -->
  <rect x="4" y="12" width="8" height="1" fill="#DAD2BC"/>
  <!-- Diamond gem top -->
  <rect x="5" y="3" width="6" height="5" fill="#A8DADC"/>
  <rect x="6" y="2" width="4" height="6" fill="#A8DADC"/>
  <rect x="7" y="1" width="2" height="7" fill="#A8DADC"/>
  <!-- Gem outline -->
  <rect x="6" y="1" width="4" height="1" fill="#3A2A1B"/>
  <rect x="5" y="2" width="1" height="2" fill="#3A2A1B"/>
  <rect x="10" y="2" width="1" height="2" fill="#3A2A1B"/>
  <rect x="4" y="4" width="1" height="4" fill="#3A2A1B"/>
  <rect x="11" y="4" width="1" height="4" fill="#3A2A1B"/>
  <rect x="5" y="8" width="6" height="1" fill="#3A2A1B"/>
  <rect x="6" y="9" width="4" height="1" fill="#3A2A1B"/>
  <!-- Gem facets -->
  <rect x="7" y="2" width="2" height="1" fill="#F8EDD4"/>
  <rect x="6" y="3" width="2" height="2" fill="#EAE0CC"/>
  <rect x="9" y="3" width="2" height="2" fill="#6D5A7E" opacity="0.5"/>
  <rect x="6" y="6" width="4" height="2" fill="#6D5A7E" opacity="0.3"/>
  <!-- Setting prongs (connect gem to band) -->
  <rect x="5" y="8" width="2" height="2" fill="#F5C26B"/>
  <rect x="9" y="8" width="2" height="2" fill="#F5C26B"/>
</svg>
